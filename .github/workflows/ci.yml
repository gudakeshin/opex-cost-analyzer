name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly LLM eval run at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  # -----------------------------------------------------------------------
  # Frontend build (React + Vite + TypeScript)
  # -----------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # -----------------------------------------------------------------------
  # Unit tests (fully deterministic — no LLM API calls)
  # -----------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        # Pinned for deterministic lint/type-check runs — unpinned linters can
        # introduce new rules/inference that fail CI on unrelated changes.
        run: pip install ruff==0.15.9 mypy==1.17.1 pytest-cov pytest-asyncio==1.1.0

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports --no-error-summary

      - name: Run unit tests with coverage
        run: PYTHONPATH=. pytest tests/ -m "not llm_judge" -q --tb=short --cov=app --cov-fail-under=70 --cov-report=term-missing

  # -----------------------------------------------------------------------
  # Security audit — scan for known CVEs in dependencies
  # -----------------------------------------------------------------------
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit production dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
        # '|| true' prevents build failure on low-severity findings; remove for strict mode

  # -----------------------------------------------------------------------
  # LLM eval — nightly only, requires ANTHROPIC_API_KEY secret
  # -----------------------------------------------------------------------
  test-llm-eval:
    name: LLM Eval (Nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LLM judge tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LLM_JUDGE: "1"
        run: PYTHONPATH=. pytest tests/eval/ -m llm_judge -v --tb=short
