apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opex-analyzer.fullname" . }}
  labels:
    {{- include "opex-analyzer.labels" . | nindent 4 }}
    opex/engagement-id: {{ .Values.engagement.id | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opex-analyzer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opex-analyzer.selectorLabels" . | nindent 8 }}
        opex/engagement-id: {{ .Values.engagement.id | quote }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: opex-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: ENGAGEMENT_ID
              value: {{ .Values.engagement.id | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.engagement.environment | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: PYTHONPATH
              value: {{ .Values.env.PYTHONPATH | quote }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ include "opex-analyzer.fullname" . }}-redis-master:6379/0"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "opex-analyzer.fullname" . }}-secrets
                  key: redis-password
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opex-analyzer.fullname" . }}-secrets
                  key: anthropic-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "opex-analyzer.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
