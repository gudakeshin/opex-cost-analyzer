source_validation_date: '2026-05-21'
source_validation_note: 'Free source URLs verified. Sample metrics are indicative public disclosures. Licensed sources require credentials — no data fabricated for licensed entries.'

sector: manufacturing_diversified

free_sources:
  - id: bse_annual_reports
    name: BSE Annual Report Filings
    url: 'https://www.bseindia.com/corporates/ann.html'
    data_available: [segment_revenue, ebitda, material_cost, energy_cost, logistics_cost]
    refresh_frequency: annual
    parser: bse_pdf_parser
    sample_metric: 'Manufacturing EBITDA margins median: 12–18% across diversified conglomerates (BSE/MCA21 XBRL FY2024)'
  - id: mca21_financials
    name: MCA21 Financial Statements (Schedule III)
    url: 'https://www.mca.gov.in/content/mca/global/en/acts-rules/ebooks/xbrl.html'
    data_available: [opex_breakdown, depreciation, employee_benefit_expense, other_expenses]
    refresh_frequency: annual
    parser: mca21_xbrl_parser
    sample_metric: 'Schedule III opex breakdown (material cost, employee benefit expense, depreciation, other expenses) available for all registered companies via MCA21 XBRL (FY2024)'
  - id: brsr_disclosures
    name: BRSR Core Disclosures (energy, water, waste)
    url: 'https://www.bseindia.com/corporates/ann.html'
    data_available: [scope1_emissions, scope2_emissions, water_consumed_kl, waste_generated_t]
    refresh_frequency: annual
    parser: brsr_xml_parser
    sample_metric: 'Manufacturing sector scope 1+2 emissions intensity mandatory under BRSR for top 1,000 listed companies; energy cost as % of revenue: 4–8% for heavy manufacturing (BRSR FY2024)'
  - id: cea_energy_statistics
    name: Central Electricity Authority — Industry Energy Consumption Data
    url: 'https://cea.nic.in/annual-report/'
    data_available: [industrial_energy_intensity, sector_avg_tariff]
    refresh_frequency: annual
    parser: cea_excel_parser
    sample_metric: 'Industrial electricity tariff average: ₹7.2–9.5/kWh across states; industry energy consumption: 42% of total national consumption (CEA Annual Report 2023-24)'

licensed_sources_stubs:
  - id: cmie_prowess_iq
    name: CMIE Prowess IQ
    credential_env: CMIE_API_KEY
    data_available: [detailed_cost_lines, 10yr_time_series]
    adapter_class: app.services.benchmarks_india.CmieAdapter
    data_available_note: 'pending_credentials — contact provider for licensed data access'
  - id: crisil_research
    name: CRISIL Industry Reports
    credential_env: CRISIL_API_KEY
    data_available: [sector_ebitda_margins, cost_benchmarks]
    adapter_class: app.services.benchmarks_india.CrisilAdapter
    data_available_note: 'pending_credentials — contact provider for licensed data access'
